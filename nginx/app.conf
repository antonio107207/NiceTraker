# Host nginx config for NiceTasker — install on the nginx server.
#
# 1. Replace "tasker.example.com" with your domain.
# 2. Replace "10.10.0.2" with the private IP of the deploy server.
# 3. Copy to /etc/nginx/sites-available/nice_tasker on the nginx server.
# 4. sudo ln -s /etc/nginx/sites-available/nice_tasker /etc/nginx/sites-enabled/
# 5. sudo certbot --nginx -d tasker.example.com
# 6. sudo nginx -t && sudo systemctl reload nginx

server {
    server_name tasker.example.com;

    location /cable {
        proxy_pass http://10.10.0.2:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_buffering off;
        proxy_read_timeout    90;
        proxy_connect_timeout 90;
        proxy_redirect        off;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
        proxy_pass http://10.10.0.2:3001;
    }

    client_max_body_size 50m;

    # SSL managed by Certbot — added automatically after: certbot --nginx -d tasker.example.com
}

server {
    if ($host = tasker.example.com) {
        return 301 https://$host$request_uri;
    }

    server_name tasker.example.com;
    listen 80;
    return 404;
}
